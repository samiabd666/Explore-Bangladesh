<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Explore Bangladesh</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Explore Bangladesh</h1>

<div class="container">

  <!-- Dhaka Button -->
  <button class="district-btn" onclick="toggleDistrict('dhaka')">Dhaka</button>

  <div id="dhaka" class="spots-box">
    <div class="spot-card">Lalbagh Fort</div>
    <div class="spot-card">Ahsan Manzil</div>
  </div>

  <!-- Chattogram Button -->
  <button class="district-btn" onclick="toggleDistrict('chattogram')">Chattogram</button>

  <div id="chattogram" class="spots-box">
    <div class="spot-card">Cox's Bazar</div>
    <div class="spot-card">Patenga Sea Beach</div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
