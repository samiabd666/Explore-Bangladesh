<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Explore Bangladesh</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">Bangladesh</div>

    <div class="menu">
      <span id="menuBtn">⋮</span>
      <div id="dropdown" class="dropdown">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <h1>Explore Bangladesh</h1>
    <p>Find tourist places across all districts</p>
    <input type="text" id="searchInput" placeholder="Search district or place...">
  </section>

  <!-- District -->
  <section class="container">
    <div id="districtContainer" class="district-grid"></div>
  </section>

  <!-- Spots -->
  <section class="container">
    <div id="spotContainer" class="spot-grid"></div>
  </section>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
