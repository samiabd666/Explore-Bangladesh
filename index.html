<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Explore Bangladesh</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">Explore Bangladesh</div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <h1>Discover Bangladesh</h1>
    <p>Explore all the beautiful tourist places across districts</p>

    <!-- Search -->
    <input type="text" id="searchInput" placeholder="Search district or place...">
  </section>

  <!-- District Section -->
  <section class="container">
    <div id="districtContainer" class="district-grid"></div>
  </section>

  <!-- Tourist Spots Section -->
  <section class="container">
    <div id="spotContainer" class="spot-grid"></div>
  </section>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
